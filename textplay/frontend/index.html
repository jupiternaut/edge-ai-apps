<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TextPlay - AI Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <span class="logo">TextPlay</span>
      <div id="status-bar">
        <span id="hp-display">HP: 100</span>
        <span id="pos-display">Pos: 4,5</span>
        <span id="turn-display">Turn: 0</span>
      </div>
    </header>
    <main id="main">
      <div id="game-panel">
        <canvas id="game-canvas" width="640" height="480"></canvas>
      </div>
      <aside id="inventory-panel">
        <h3>Inventory</h3>
        <ul id="inventory-list"></ul>
        <div id="quest-panel">
          <h3>Quests</h3>
          <ul id="quest-list"></ul>
        </div>
      </aside>
    </main>
    <div id="chat-panel">
      <div id="chat-messages"></div>
      <form id="chat-form">
        <input id="chat-input" type="text" placeholder="Tell your character what to do..." autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
